<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional BRF Editor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; line-height: 1.6; }
        textarea { 
            width: 100%; 
            height: 400px; 
            font-family: 'Courier New', monospace; /* Monospace is vital for Braille alignment */
            font-size: 1.2rem;
            padding: 10px;
            border: 2px solid #333;
            box-sizing: border-box;
        }
        .controls { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .warning { color: red; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <h2>BRF Document Creator</h2>
    <div class="controls">
        <p><strong>Instructions:</strong> Type in Braille ASCII. Each line should be 40 characters or less.</p>
        <div id="counter">Current Line Length: 0</div>
        <div id="limit-msg" class="warning">⚠️ Line exceeds 40 characters!</div>
    </div>

    <textarea id="editor" spellcheck="false" oninput="checkLineLength()"></textarea>
    
    <br><br>
    <button onclick="downloadBRF()" style="padding: 10px 20px; cursor: pointer;">Download .brf for Client</button>

    <script>
        const editor = document.getElementById('editor');
        const counter = document.getElementById('counter');
        const warning = document.getElementById('limit-msg');

        function checkLineLength() {
            const lines = editor.value.split('\n');
            const currentLine = lines[lines.length - 1];
            counter.innerText = `Current Line Length: ${currentLine.length}`;
            
            if (currentLine.length > 40) {
                warning.style.display = 'block';
            } else {
                warning.style.display = 'none';
            }
        }

        function downloadBRF() {
            const content = editor.value;
            // We use \r\n (Windows Carriage Return) because many Braille 
            // hardware devices specifically look for Windows-style line endings.
            const formattedContent = content.replace(/\n/g, '\r\n');
            
            const blob = new Blob([formattedContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "client_document.brf";
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
